service: hubbase-agent

frameworkVersion: ">=4"

useDotenv: true

provider:
  name: aws
  runtime: python3.13
  region: ${env:AWS_REGION, "us-east-1"}
  architecture: arm64
  memorySize: 512
  timeout: 29
  logRetentionInDays: 30
  environment:
    API_KEY: ${env:API_KEY}
    HYDRADB_API_KEY: ${env:HYDRADB_API_KEY}
    GMI_API_KEY: ${env:GMI_API_KEY}
    GMAIL_USER: ${env:GMAIL_USER}
    GMAIL_PASSWORD: ${env:GMAIL_PASSWORD}
    GMAIL_SENDER_NAME: ${env:GMAIL_SENDER_NAME, "Umair Khokhar"}
    GMAIL_SIGNATURE: ${env:GMAIL_SIGNATURE, ""}
    AGENCY_NAME: ${env:AGENCY_NAME, "Our Agency"}
    AGENCY_URL: ${env:AGENCY_URL, ""}
    AGENCY_TAGLINE: ${env:AGENCY_TAGLINE, "HubSpot Partner"}
    AGENCY_CALENDAR_URL: ${env:AGENCY_CALENDAR_URL, ""}

functions:
  api:
    handler: routes.handler
    events:
      - httpApi:
          path: /{proxy+}
          method: ANY
      - httpApi:
          path: /
          method: ANY

custom:
  pythonRequirements:
    dockerizePip: true
    slim: false
    useDownloadCache: true
    useStaticCache: true
